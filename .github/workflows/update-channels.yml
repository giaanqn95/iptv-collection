name: Update IPTV Channels

on:
  schedule:
    # Run daily at 03:00 UTC
    - cron: '0 3 * * *'
  # Allow manual trigger from Actions tab
  workflow_dispatch:
    inputs:
      validate_streams:
        description: 'Validate stream URLs (slow — ~30 min)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  aggregate:
    name: Aggregate & publish channels
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── Checkout ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Python ────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      # ── Run aggregator ────────────────────────────────────
      - name: Run aggregation script
        env:
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_STREAMS:  ${{ github.event.inputs.validate_streams || 'false' }}
          VALIDATE_WORKERS:  '40'
          VALIDATE_TIMEOUT:  '8'
        run: |
          python scripts/aggregate.py
          echo "channels_count=$(python -c "import json; d=json.load(open('data/channels.json')); print(d['total'])")" >> $GITHUB_ENV

      # ── Show stats ────────────────────────────────────────
      - name: Print stats
        run: |
          echo "Total channels: ${{ env.channels_count }}"
          ls -lh data/

      # ── Commit & push ─────────────────────────────────────
      - name: Commit updated channel data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/channels.json data/channels.m3u
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update channels — ${{ env.channels_count }} channels [skip ci]"
            git push
          fi
