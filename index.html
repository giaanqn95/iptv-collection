<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IPTV Collection — Free Live TV Channels</title>
  <meta name="description" content="A curated collection of publicly available IPTV channels from around the world. Browse, search, and stream free live TV." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📺</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { 400: '#818cf8', 500: '#6366f1', 600: '#4f46e5' }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">

  <!-- Header -->
  <header class="border-b border-gray-800 bg-gray-900/80 backdrop-blur sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between gap-4">
      <a href="/" class="flex items-center gap-2 shrink-0">
        <span class="text-2xl">📺</span>
        <div>
          <span class="font-bold text-lg text-white">IPTV Collection</span>
          <span class="hidden sm:inline text-xs text-gray-400 ml-2">Free Live TV</span>
        </div>
      </a>

      <!-- Search -->
      <div class="flex-1 max-w-xl">
        <div class="relative">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
          </svg>
          <input
            id="search-input"
            type="text"
            placeholder="Search channels, countries..."
            class="w-full bg-gray-800 border border-gray-700 rounded-lg pl-10 pr-4 py-2 text-sm text-gray-100 placeholder-gray-500 focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition"
            autocomplete="off"
          />
        </div>
      </div>

      <div class="flex items-center gap-2 shrink-0">
        <a href="data/channels.m3u" download class="hidden sm:flex items-center gap-2 bg-brand-600 hover:bg-brand-500 text-white text-sm font-medium px-3 py-2 rounded-lg transition">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
          M3U
        </a>
        <a href="https://github.com/giaanqn95/iptv-collection.github.io" target="_blank" class="text-gray-400 hover:text-white transition p-2">
          <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/></svg>
        </a>
      </div>
    </div>

    <!-- Stats bar -->
    <div id="stats-bar" class="border-t border-gray-800 bg-gray-900/50">
      <div class="max-w-7xl mx-auto px-4 py-2 flex items-center gap-6 text-xs text-gray-400 overflow-x-auto">
        <span id="stat-total" class="flex items-center gap-1.5 shrink-0">
          <span class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span>
          Loading channels...
        </span>
        <span id="stat-countries" class="shrink-0"></span>
        <span id="stat-categories" class="shrink-0"></span>
        <span id="stat-languages" class="shrink-0"></span>
        <span id="stat-updated" class="shrink-0 ml-auto"></span>
      </div>
    </div>
  </header>

  <!-- Main Layout -->
  <div class="max-w-7xl mx-auto px-4 py-6 flex gap-6">

    <!-- Sidebar Filters -->
    <aside class="hidden lg:block w-56 shrink-0">
      <div class="sticky top-32 space-y-5">
        <!-- Filter by type -->
        <div>
          <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Browse by</h3>
          <nav class="space-y-1">
            <button data-view="all" class="view-tab w-full text-left px-3 py-2 rounded-lg text-sm font-medium text-white bg-brand-600 transition flex items-center gap-2">
              <span>🌐</span> All Channels
            </button>
            <button data-view="country" class="view-tab w-full text-left px-3 py-2 rounded-lg text-sm font-medium text-gray-400 hover:text-white hover:bg-gray-800 transition flex items-center gap-2">
              <span>🏳️</span> By Country
            </button>
            <button data-view="category" class="view-tab w-full text-left px-3 py-2 rounded-lg text-sm font-medium text-gray-400 hover:text-white hover:bg-gray-800 transition flex items-center gap-2">
              <span>📂</span> By Category
            </button>
            <button data-view="language" class="view-tab w-full text-left px-3 py-2 rounded-lg text-sm font-medium text-gray-400 hover:text-white hover:bg-gray-800 transition flex items-center gap-2">
              <span>💬</span> By Language
            </button>
          </nav>
        </div>

        <!-- Category Filter -->
        <div>
          <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Category</h3>
          <div id="category-filter" class="space-y-1 max-h-64 overflow-y-auto pr-1 custom-scroll"></div>
        </div>

        <!-- Country Filter -->
        <div>
          <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Country</h3>
          <div id="country-filter" class="space-y-1 max-h-64 overflow-y-auto pr-1 custom-scroll"></div>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 min-w-0">

      <!-- Mobile Filters -->
      <div class="lg:hidden mb-4 flex gap-2 overflow-x-auto pb-2 custom-scroll">
        <button data-view="all" class="view-tab-mobile shrink-0 px-4 py-2 rounded-full text-sm font-medium bg-brand-600 text-white transition">All</button>
        <button data-view="country" class="view-tab-mobile shrink-0 px-4 py-2 rounded-full text-sm font-medium bg-gray-800 text-gray-400 hover:text-white transition">Country</button>
        <button data-view="category" class="view-tab-mobile shrink-0 px-4 py-2 rounded-full text-sm font-medium bg-gray-800 text-gray-400 hover:text-white transition">Category</button>
        <button data-view="language" class="view-tab-mobile shrink-0 px-4 py-2 rounded-full text-sm font-medium bg-gray-800 text-gray-400 hover:text-white transition">Language</button>
      </div>

      <!-- Active Filters -->
      <div id="active-filters" class="hidden mb-4 flex flex-wrap gap-2"></div>

      <!-- Results header -->
      <div class="flex items-center justify-between mb-4">
        <div>
          <h2 id="section-title" class="text-lg font-semibold text-white">All Channels</h2>
          <p id="result-count" class="text-sm text-gray-400"></p>
        </div>
        <div class="flex items-center gap-2">
          <button id="view-grid" class="p-2 rounded text-brand-400" title="Grid view">
            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M3 3h7v7H3V3zm11 0h7v7h-7V3zM3 14h7v7H3v-7zm11 0h7v7h-7v-7z"/></svg>
          </button>
          <button id="view-list" class="p-2 rounded text-gray-500 hover:text-gray-300" title="List view">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
          </button>
        </div>
      </div>

      <!-- Group view (countries/categories/languages) -->
      <div id="group-view" class="hidden"></div>

      <!-- Channel Grid -->
      <div id="channel-grid" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-3"></div>

      <!-- Loading -->
      <div id="loading" class="text-center py-20">
        <div class="inline-flex items-center gap-3 text-gray-400">
          <svg class="animate-spin w-5 h-5" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
          </svg>
          Loading channels...
        </div>
      </div>

      <!-- Empty state -->
      <div id="empty-state" class="hidden text-center py-20 text-gray-500">
        <div class="text-5xl mb-4">📭</div>
        <p class="text-lg font-medium">No channels found</p>
        <p class="text-sm mt-1">Try adjusting your search or filters</p>
        <button onclick="clearFilters()" class="mt-4 text-brand-400 hover:text-brand-300 text-sm underline">Clear filters</button>
      </div>

      <!-- Pagination -->
      <div id="pagination" class="hidden mt-8 flex items-center justify-center gap-2"></div>
    </main>
  </div>

  <!-- Channel Detail Modal -->
  <div id="modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-black/70 backdrop-blur-sm" onclick="closeModal()"></div>
    <div class="relative bg-gray-900 border border-gray-700 rounded-xl w-full max-w-lg shadow-2xl">
      <div id="modal-content"></div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 hidden">
    <div class="bg-gray-800 border border-gray-700 text-white text-sm px-4 py-2 rounded-full shadow-lg flex items-center gap-2">
      <svg class="w-4 h-4 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
      <span id="toast-msg">Copied!</span>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
